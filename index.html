
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Racing - Finish Line & Speed Boost</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10;
        }
        #speedometer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(255,0,0,0.8);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 20;
            font-size: 48px;
            font-weight: bold;
        }
        #winmessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,255,0,0.8);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 20;
            font-size: 48px;
            font-weight: bold;
        }
        #restart {
            font-size: 24px;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: red;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
            border: 2px solid yellow;
        }
    </style>
</head>
<body>
    <div id="info">
        <div>Score: <span id="score">0</span></div>
        <div>Enemies Passed: <span id="enemiesPassed">0</span></div>
        <div>Boost: <span id="boostActive">No</span></div>
    </div>
    <div id="speedometer">
        SPEED: <span id="speedValue">0</span> km/h
    </div>
    <div id="gameover">
        GAME OVER
        <div>Final Score: <span id="finalScore">0</span></div>
        <button id="restart">RESTART</button>
    </div>
    <div id="winmessage">
        YOU WIN! 🏁
        <div>Final Score: <span id="winScore">0</span></div>
        <button id="restartWin">RESTART</button>
    </div>
   
<div class="controls">
    Controls: Left (⬅️) | Right (➡️) | UP = AccelerateBrake / Reverse | DOWN =Accelerate <br>
    Tip: Drive over GREEN pads to get a speed BOOST!
</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Create Road with Movement Effect ---
        const roadLength = 500;
        const roadWidth = 12;
        
        // Road base
        const roadGeo = new THREE.PlaneGeometry(roadWidth, roadLength);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.z = roadLength / 2 - 50;
        road.receiveShadow = true;
        scene.add(road);

        // Lane markings (moving)
        const laneMarkers = [];
        for (let i = 0; i < 20; i++) {
            const markerGeo = new THREE.PlaneGeometry(0.5, 3);
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.rotation.x = -Math.PI / 2;
            marker.position.set(0, 0.02, i * 15 - 50);
            marker.receiveShadow = true;
            scene.add(marker);
            laneMarkers.push(marker);
        }

        // Road edges
        const edgeMat = new THREE.LineBasicMaterial({ color: 0xffaa00 });
        const leftEdgePoints = [new THREE.Vector3(-6, 0.02, -50), new THREE.Vector3(-6, 0.02, roadLength-50)];
        const leftEdgeGeo = new THREE.BufferGeometry().setFromPoints(leftEdgePoints);
        const leftEdge = new THREE.Line(leftEdgeGeo, edgeMat);
        scene.add(leftEdge);
        
        const rightEdgePoints = [new THREE.Vector3(6, 0.02, -50), new THREE.Vector3(6, 0.02, roadLength-50)];
        const rightEdgeGeo = new THREE.BufferGeometry().setFromPoints(rightEdgePoints);
        const rightEdge = new THREE.Line(rightEdgeGeo, edgeMat);
        scene.add(rightEdge);

        // --- FINISH LINE (New) ---
        const finishLineGroup = new THREE.Group();
        // Base strip
        const finishStripGeo = new THREE.BoxGeometry(roadWidth, 0.1, 2);
        const finishStripMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444 });
        const finishStrip = new THREE.Mesh(finishStripGeo, finishStripMat);
        finishStrip.position.set(0, 0.05, 400); // Place at end of road
        finishStrip.receiveShadow = true;
        finishStrip.castShadow = true;
        finishLineGroup.add(finishStrip);

        // Checker pattern (alternating black/white squares)
        for (let i = -5; i <= 5; i+=2) {
            const squareGeo = new THREE.BoxGeometry(1, 0.2, 1);
            const squareMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const square = new THREE.Mesh(squareGeo, squareMat);
            square.position.set(i + 0.5, 0.15, 400);
            finishLineGroup.add(square);
        }
        for (let i = -4; i <= 5; i+=2) {
            const squareGeo = new THREE.BoxGeometry(1, 0.2, 1);
            const squareMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const square = new THREE.Mesh(squareGeo, squareMat);
            square.position.set(i, 0.15, 401);
            finishLineGroup.add(square);
        }
        scene.add(finishLineGroup);

        // --- SPEED BOOST PADS (New) ---
        const boostPads = [];
        function addBoostPad(x, z) {
            const padGeo = new THREE.BoxGeometry(2, 0.1, 2);
            const padMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
            const pad = new THREE.Mesh(padGeo, padMat);
            pad.position.set(x, 0.1, z);
            pad.receiveShadow = true;
            pad.castShadow = true;
            scene.add(pad);
            boostPads.push({ mesh: pad, active: true });
        }
        // Place boost pads along the road
        addBoostPad(-3, 100);
        addBoostPad(3, 200);
        addBoostPad(-2, 300);
        addBoostPad(2, 380); // near finish line

        // --- Create Car Function (More Detailed) ---
        function createCar(color, posX = 0, posZ = 0) {
            const carGroup = new THREE.Group();

            // Main body
            const bodyGeo = new THREE.BoxGeometry(2.2, 1, 4.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x000000 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            carGroup.add(body);

            // Top cabin
            const cabinGeo = new THREE.BoxGeometry(1.6, 0.8, 2.2);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x88aaff });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 1.2, -0.3);
            cabin.castShadow = true;
            cabin.receiveShadow = true;
            carGroup.add(cabin);

            // Windows
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x224466, emissive: 0x112233 });
            const windowFront = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.2), windowMat);
            windowFront.position.set(0, 1.4, 0.8);
            windowFront.castShadow = true;
            carGroup.add(windowFront);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.6, 24);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            
            const positions = [
                [-1.2, 0.4, 1.5], [1.2, 0.4, 1.5],
                [-1.2, 0.4, -1.5], [1.2, 0.4, -1.5]
            ];
            positions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                wheel.receiveShadow = true;
                carGroup.add(wheel);
            });

            // Headlights
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x442200 });
            const headlightLeft = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8), lightMat);
            headlightLeft.position.set(-0.9, 0.7, 2.1);
            carGroup.add(headlightLeft);
            const headlightRight = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8), lightMat);
            headlightRight.position.set(0.9, 0.7, 2.1);
            carGroup.add(headlightRight);

            carGroup.position.set(posX, 0, posZ);
            return carGroup;
        }

        // Player car (RED - FAST)
        const playerCar = createCar(0xff3333, 0, 10);
        scene.add(playerCar);

        // Enemy cars array
        const enemies = [];
        const enemyColors = [0x3333ff, 0x33ff33, 0xff33ff, 0xffff33];

        // --- GAME VARIABLES ---
        let score = 0;
        let enemiesPassed = 0;
        let carSpeed = 0; // Current speed of player car
        const baseMaxSpeed = 30;
        let maxSpeed = baseMaxSpeed;
        const acceleration = 0.5;
        const turnSpeed = 0.3;
        let gameOver = false;
        let gameWon = false;
        let boostActive = false;
        let boostTimer = 0;
        const keys = {};

        // UI elements
        const scoreSpan = document.getElementById('score');
        const enemiesPassedSpan = document.getElementById('enemiesPassed');
        const speedValueSpan = document.getElementById('speedValue');
        const boostActiveSpan = document.getElementById('boostActive');
        const gameoverDiv = document.getElementById('gameover');
        const winDiv = document.getElementById('winmessage');
        const finalScoreSpan = document.getElementById('finalScore');
        const winScoreSpan = document.getElementById('winScore');
        const restartBtn = document.getElementById('restart');
        const restartWinBtn = document.getElementById('restartWin');

        // --- Input handling ---
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Restart function
        function restartGame() {
            enemies.forEach(e => scene.remove(e.mesh));
            enemies.length = 0;
            playerCar.position.x = 0;
            playerCar.position.z = 10;
            carSpeed = 0;
            maxSpeed = baseMaxSpeed;
            boostActive = false;
            boostTimer = 0;
            score = 0;
            enemiesPassed = 0;
            gameOver = false;
            gameWon = false;
            gameoverDiv.style.display = 'none';
            winDiv.style.display = 'none';
            // Reactivate boost pads
            boostPads.forEach(p => p.active = true);
        }

        restartBtn.addEventListener('click', restartGame);
        restartWinBtn.addEventListener('click', restartGame);

        // --- Spawn enemies (more frequent) ---
        function spawnEnemy() {
            if (gameOver || gameWon) return;
            const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];
            const x = (Math.random() - 0.5) * 8;
            const enemyMesh = createCar(color, x, 150);
            scene.add(enemyMesh);
            enemies.push({ mesh: enemyMesh, x, z: 150 });
        }

        setInterval(() => {
            if (!gameOver && !gameWon) spawnEnemy();
        }, 1000);

        // --- Camera follow ---
        function updateCamera() {
            camera.position.x = playerCar.position.x;
            camera.position.y = 5 + (carSpeed * 0.1);
            camera.position.z = playerCar.position.z - 12;
            camera.lookAt(playerCar.position.x, 1, playerCar.position.z + 10);
        }

        // --- Collision detection ---
        function checkCollision() {
            const playerBox = new THREE.Box3().setFromObject(playerCar);
            for (let enemy of enemies) {
                const enemyBox = new THREE.Box3().setFromObject(enemy.mesh);
                if (playerBox.intersectsBox(enemyBox)) {
                    return true;
                }
            }
            return false;
        }

        // --- Check finish line collision ---
        function checkFinish() {
            const playerBox = new THREE.Box3().setFromObject(playerCar);
            const finishBox = new THREE.Box3().setFromObject(finishLineGroup);
            return playerBox.intersectsBox(finishBox);
        }

        // --- Check boost pad collision ---
        function checkBoostPads() {
            const playerBox = new THREE.Box3().setFromObject(playerCar);
            for (let pad of boostPads) {
                if (!pad.active) continue;
                const padBox = new THREE.Box3().setFromObject(pad.mesh);
                if (playerBox.intersectsBox(padBox)) {
                    pad.active = false;
                    pad.mesh.material.emissive.setHex(0x00ff00); // make it glow
                    // Apply boost
                    boostActive = true;
                    boostTimer = 150; // frames
                    maxSpeed = baseMaxSpeed * 2; // double speed during boost
                    // Change pad color to indicate used
                    pad.mesh.material.color.setHex(0xaaaaaa);
                }
            }
        }

        // --- Update lane markers ---
        function updateLaneMarkers() {
            laneMarkers.forEach(marker => {
                marker.position.z -= carSpeed * 0.2;
                if (marker.position.z < -80) {
                    marker.position.z = 400;
                }
            });
        }

        // --- Game loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (!gameOver && !gameWon) {
                // ===== CAR MOVEMENT =====
                // Acceleration (UP arrow)
                if (keys['ArrowUp']) {
                    carSpeed += acceleration;
                    if (carSpeed > maxSpeed) carSpeed = maxSpeed;
                }
                // Brake/Reverse (DOWN arrow)
                if (keys['ArrowDown']) {
                    carSpeed -= acceleration * 1.5;
                    if (carSpeed < -10) carSpeed = -10;
                }
                // Natural deceleration
                if (!keys['ArrowUp'] && !keys['ArrowDown']) {
                    if (carSpeed > 0) {
                        carSpeed -= 0.1;
                        if (carSpeed < 0) carSpeed = 0;
                    } else if (carSpeed < 0) {
                        carSpeed += 0.1;
                        if (carSpeed > 0) carSpeed = 0;
                    }
                }

                // Boost timer
                if (boostActive) {
                    boostTimer--;
                    if (boostTimer <= 0) {
                        boostActive = false;
                        maxSpeed = baseMaxSpeed;
                    }
                }

                // Steering
                if (carSpeed > 0.5 || carSpeed < -0.5) {
                    if (keys['ArrowLeft']) {
                        playerCar.position.x -= turnSpeed * (carSpeed / 5);
                    }
                    if (keys['ArrowRight']) {
                        playerCar.position.x += turnSpeed * (carSpeed / 5);
                    }
                }

                // Boundaries
                if (playerCar.position.x < -5) playerCar.position.x = -5;
                if (playerCar.position.x > 5) playerCar.position.x = 5;

                // Move player car
                playerCar.position.z -= carSpeed * 0.2;

                // Check finish line
                if (checkFinish()) {
                    gameWon = true;
                    winScoreSpan.textContent = score;
                    winDiv.style.display = 'block';
                }

                // Check boost pads
                checkBoostPads();

                // Update enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    enemy.mesh.position.z -= (carSpeed + 5) * 0.2;
                    
                    if (enemy.mesh.position.z < playerCar.position.z - 15) {
                        scene.remove(enemy.mesh);
                        enemies.splice(i, 1);
                        enemiesPassed++;
                        score += 10;
                    }
                }

                // Collision detection
                if (checkCollision()) {
                    gameOver = true;
                    finalScoreSpan.textContent = score;
                    gameoverDiv.style.display = 'block';
                }

                // Update lane markers
                updateLaneMarkers();

                // Update UI
                scoreSpan.textContent = score;
                enemiesPassedSpan.textContent = enemiesPassed;
                speedValueSpan.textContent = Math.abs(Math.floor(carSpeed * 5));
                boostActiveSpan.textContent = boostActive ? "YES" : "No";
                boostActiveSpan.style.color = boostActive ? "#00ff00" : "white";

                // Camera
                updateCamera();
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Add trees and scenery
        function addTree(x, z) {
            const treeGroup = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 3);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.5;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);

            const foliageGeo = new THREE.ConeGeometry(1.2, 2.5, 8);
            const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            const foliage = new THREE.Mesh(foliageGeo, foliageMat);
            foliage.position.y = 3.5;
            foliage.castShadow = true;
            foliage.receiveShadow = true;
            treeGroup.add(foliage);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }

        for (let i = -100; i < 200; i += 20) {
            addTree(-9, i);
            addTree(9, i);
        }

        // Add ramps for fun
        function addRamp(z) {
            const rampGeo = new THREE.BoxGeometry(8, 0.8, 6);
            const rampMat = new THREE.MeshStandardMaterial({ color: 0xcc8800 });
            const ramp = new THREE.Mesh(rampGeo, rampMat);
            ramp.position.set(0, 0.4, z);
            ramp.rotation.x = 0.3;
            ramp.receiveShadow = true;
            ramp.castShadow = true;
            scene.add(ramp);
        }
        
        addRamp(40);
        addRamp(80);
        addRamp(120);
    </script>
</body>
</html>
